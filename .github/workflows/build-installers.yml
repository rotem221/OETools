name: Build installers

# Produces the macOS (.dmg / .app) and Windows (.exe / .msi) installers and the
# signed auto-updater artifacts (+ latest.json). Windows installers MUST be built
# on Windows (WebView2 + MSVC + WiX/NSIS), so this cross-platform matrix runs
# each OS on its own native runner.
#
# Auto-updates require two repository secrets to be configured:
#   TAURI_SIGNING_PRIVATE_KEY          -> contents of src-tauri/.tauri/oetools_updater.key
#   TAURI_SIGNING_PRIVATE_KEY_PASSWORD -> the password used when generating the key (empty by default)
# The matching public key already lives in src-tauri/tauri.conf.json (plugins.updater.pubkey).

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      release_tag:
        description: "Create/attach a release with this tag (e.g. v0.1.0)."
        required: true
        default: "v0.1.0"

permissions:
  contents: write

jobs:
  build:
    name: Build (${{ matrix.name }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: macOS (Apple Silicon)
            os: macos-latest
            target: aarch64-apple-darwin
          - name: macOS (Intel)
            os: macos-13
            target: x86_64-apple-darwin
          - name: Windows (x64)
            os: windows-latest
            target: x86_64-pc-windows-msvc

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache cargo
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install frontend dependencies
        run: npm install --no-audit --no-fund

      - name: Build, sign & publish (installers + updater)
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: ${{ github.ref_type == 'tag' && github.ref_name || github.event.inputs.release_tag }}
          releaseName: "OETools __VERSION__"
          releaseBody: "See the assets below to download and install. Existing installs update automatically."
          releaseDraft: false
          prerelease: false
          includeUpdaterJson: true
          args: --target ${{ matrix.target }}
